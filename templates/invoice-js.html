<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />

    <script type="application/json" id="pdf-config">
      { "output": "output/invoice-js.pdf" }
    </script>

    <style>
      @page { size: 4in 5in; }
      html, body { width: 4in; height: 5in; margin: 0; padding: 0; font-size: 16px; }
    </style>
  </head>
  <body class="bg-white p-6 font-sans text-slate-800">

    <h1 class="text-lg font-bold mb-1">Invoice #001</h1>
    <p class="text-xs text-slate-400 mb-4">Due: June 1, 2026</p>

    <table class="w-full text-xs mb-4" id="line-items"></table>

    <div class="border-t pt-2 flex justify-between text-xs font-semibold" id="total"></div>

    <!-- ── Data + rendering ───────────────────────────────────────────── -->
    <script>
      const items = [
        { description: 'UI Design',        qty: 1, rate: 1200 },
        { description: 'Frontend Dev',     qty: 3, rate:  800 },
        { description: 'Code Review',      qty: 2, rate:  150 },
        { description: 'Deployment Setup', qty: 1, rate:  300 },
      ];

      const table = document.getElementById('line-items');

      // Header
      table.innerHTML = `
        <thead>
          <tr class="border-b text-slate-400">
            <th class="text-left pb-1">Description</th>
            <th class="text-right pb-1">Qty</th>
            <th class="text-right pb-1">Rate</th>
            <th class="text-right pb-1">Total</th>
          </tr>
        </thead>
        <tbody>
          ${items.map(item => `
            <tr class="border-b border-slate-100">
              <td class="py-1">${item.description}</td>
              <td class="py-1 text-right">${item.qty}</td>
              <td class="py-1 text-right">$${item.rate}</td>
              <td class="py-1 text-right font-medium">$${item.qty * item.rate}</td>
            </tr>
          `).join('')}
        </tbody>
      `;

      const total = items.reduce((sum, i) => sum + i.qty * i.rate, 0);
      document.getElementById('total').innerHTML = `
        <span>Total</span>
        <span>$${total.toLocaleString()}</span>
      `;
    </script>

  </body>
</html>
