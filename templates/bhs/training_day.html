<div style="width: 100%; height: 2.7in;"
     x-data="{
      days: ['M', 'T', 'W', 'T', 'F', 'S']
     }">
  <include src="partials/header.html"/>
  <div class="p-2 text-gray-500 border-gray-500">
    <div class="flex items-center gap-1">
      <span class="">Name</span>
      <div class="border border-gray-500 rounded-md flex-grow h-8"></div>
    </div>
    <div class="mt-1">
      <!-- list of days -->
      <div class="flex w-full items-baseline">
        <div class="flex gap-1">
          <template x-for="(day) of days">
            <div class="rounded-full w-6 h-6 border border-gray-500 border-1 text-center flex items-center justify-center"
              x-text="day"></div>
          </template>
        </div>
        <div class="ml-auto">
          <span class="whitespace-pre border border-gray-500 rounded-md text-xl text-center flex items-center justify-center">        /      /        </span>
        </div>
      </div>
    </div>
    <div class="flex justify-between flex-wrap">
      <!-- list of form items -->
      <div x-data="{ title: 'Distance', width: '120px', height: null}"><include src="partials/form_item.html"/></div>
      <div x-data="{ title: 'Time', width: '120px', height: null}"><include src="partials/form_item.html"/></div>
      <div x-data="{ title: 'Effort', width: '120px', height: null}"><include src="partials/form_item.html"/></div>
      <div x-data="{ title: 'Notes', width: '100%', height: '64'}" class="w-full"><include src="partials/form_item.html"/></div>
    </div>
  </div>
</div>
