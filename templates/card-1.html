<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />

    <script type="application/json" id="pdf-config">
      { "output": "output/card-1.pdf" }
    </script>

    <style>
      /* ── Page dimensions ─────────────────────────────────────────────────
         This controls the PDF size. Change to e.g. "8.5in 11in" for letter,
         "210mm 297mm" for A4, or any arbitrary size like "400px 600px".      */
      @page {
        size: 3in 2in;
      }

      /* ── Document base ───────────────────────────────────────────────── */
      html, body {
        width: 3in;
        height: 2in;
        margin: 0;
        padding: 0;
        font-size: 16px;
      }
    </style>
  </head>
  <body class="bg-white font-sans text-slate-800 flex flex-col">

    <include src="partials/header.html">

    <div class="p-3 flex flex-col gap-2">
      <h2 class="text-sm font-semibold">Card Title</h2>
      <p class="text-xs text-slate-500 leading-relaxed">
        Notes go here. Each card shares the same header but can have
        its own content below.
      </p>
    </div>

  </body>
</html>
